<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>chat gorilla socket</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* =========================================
     เปลี่ยนสีธีมของแอปได้ที่กล่อง :root นี้เลยครับ
     ========================================= */
    :root {
      --bg-page: #0F111A;
      /* สีพื้นหลังนอกสุด (น้ำเงินเข้มมาก) */
      --bg-sidebar: #1A1D2D;
      /* สีแถบด้านข้าง */
      --bg-main: #141722;
      /* สีพื้นหลังช่องแชท */
      --bg-input: #262A3F;
      /* สีช่องพิมพ์ข้อความ */
      --bg-hover: #323854;
      /* สีเวลาเอาเมาส์ชี้ */
      --text-main: #FFFFFF;
      /* สีตัวอักษรหลัก */
      --text-muted: #8F95B2;
      /* สีตัวอักษรรอง (เทาอมฟ้า) */
      --accent: #6366F1;
      /* สีหลักของแอป (ม่วงคราม Indigo) */
      --accent-hover: #4F46E5;
      /* สีหลักตอนโดนเมาส์ชี้ */
      --danger: #F43F5E;
      /* สีแดง (แจ้งเตือน/Error) */
      --success: #10B981;
      /* สีเขียว (ออนไลน์/สำเร็จ) */
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', "Segoe UI", Tahoma, sans-serif;
      background: var(--bg-page);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--bg-hover);
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    /* Forms & Buttons */
    input,
    button {
      font-family: inherit;
      font-size: 14px;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid transparent;
      outline: none;
      transition: all 0.2s ease;
    }

    input {
      background: var(--bg-input);
      color: var(--text-main);
    }

    input::placeholder {
      color: var(--text-muted);
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25);
    }

    button {
      cursor: pointer;
      background: var(--bg-input);
      color: var(--text-main);
      font-weight: 500;
    }

    button:hover {
      background: var(--bg-hover);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    button.primary {
      background: var(--accent);
      color: #ffffff;
      font-weight: 600;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }

    button.primary:hover {
      background: var(--accent-hover);
      box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
    }

    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    /* ---- auth ---- */
    #authPanel {
      width: 100%;
      max-width: 400px;
      background: var(--bg-sidebar);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 32px 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    #authPanel h1 {
      font-size: 22px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 8px;
    }

    #authPanel input {
      width: 100%;
    }

    #authError {
      color: var(--danger);
      font-size: 13px;
      text-align: center;
      min-height: 18px;
      margin-top: -4px;
    }

    /* ---- app ---- */
    #app {
      display: none;
      width: 100%;
      max-width: 1000px;
      height: calc(100vh - 40px);
      background: var(--bg-main);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    #app.on {
      display: grid;
      grid-template-columns: 280px 1fr;
    }

    /* sidebar */
    #side {
      background: var(--bg-sidebar);
      border-right: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      flex-direction: column;
    }

    #sideHead {
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #meName {
      font-weight: 600;
      font-size: 16px;
    }

    #status {
      font-size: 12px;
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    #status::before {
      content: "";
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    #status.on {
      color: var(--success);
    }

    #status.on::before {
      background-color: var(--success);
      box-shadow: 0 0 8px var(--success);
    }

    #status.off {
      color: var(--danger);
    }

    #status.off::before {
      background-color: var(--danger);
    }

    #logoutBtn {
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 6px;
    }

    #searchBox {
      padding: 0 20px 16px;
    }

    #searchBox input {
      width: 100%;
      background: var(--bg-page);
      border-radius: 20px;
      padding: 10px 16px;
    }

    #lists {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 12px;
    }

    .listTitle {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      padding: 12px 20px 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .person {
      padding: 12px 20px;
      cursor: pointer;
      transition: background 0.2s;
      border-left: 3px solid transparent;
    }

    .person:hover {
      background: rgba(255, 255, 255, 0.03);
    }

    .person.active {
      background: var(--bg-input);
      border-left-color: var(--accent);
    }

    .person .name {
      font-size: 14.5px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .person .preview {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .empty {
      font-size: 13px;
      color: var(--text-muted);
      padding: 12px 20px;
      text-align: center;
    }

    /* thread */
    #main {
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      background: var(--bg-main);
    }

    #threadHead {
      padding: 20px 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 16px;
      font-weight: 600;
      backdrop-filter: blur(10px);
    }

    #log {
      flex: 1 1 0;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 0;
    }

    /* ตัวบอกเวลาตรงกลาง (Time Divider) */
    .time-divider {
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
      margin: 16px 0 8px;
      flex-shrink: 0;
    }

    /* Messages */
    .msg {
      padding: 10px 14px;
      max-width: 70%;
      min-width: 40px;
      font-size: 14.5px;
      line-height: 1.4;
      word-break: break-word;
      white-space: pre-wrap;
      animation: fadeIn 0.3s ease forwards;
      position: relative;
      cursor: default;
      flex-shrink: 0;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Incoming */
    .msg.in {
      background: var(--bg-input);
      align-self: flex-start;
      border-radius: 16px 16px 16px 4px;
    }

    /* Outgoing */
    .msg.out {
      background: var(--accent);
      color: #ffffff;
      align-self: flex-end;
      border-radius: 16px 16px 4px 16px;
    }

    /* ปรับสีเวลาสำหรับข้อความของฝั่งเราให้เป็นสีขาวจางๆ */
    .msg.out .meta {
      color: rgba(255, 255, 255, 0.7);
    }

    /* System Msg */
    .msg.sys {
      background: none;
      color: var(--text-muted);
      font-size: 12px;
      align-self: center;
      text-align: center;
    }

    #composer {
      display: flex;
      gap: 12px;
      padding: 20px 24px;
      background: var(--bg-sidebar);
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    #msgInput {
      flex: 1;
      border-radius: 24px;
      padding: 12px 18px;
      background: var(--bg-main);
    }

    #sendBtn {
      border-radius: 24px;
      padding: 12px 24px;
    }
  </style>
</head>

<body>

  <!-- login / register -->
  <div id="authPanel">
    <h1>เข้าสู่ระบบแชท</h1>
    <input id="userInput" placeholder="Username" autocomplete="username">
    <input id="passInput" type="password" placeholder="Password" autocomplete="current-password">
    <div class="row">
      <button id="registerBtn">สมัครสมาชิก</button>
      <button id="loginBtn" class="primary" style="flex:1">เข้าสู่ระบบ</button>
    </div>
    <div id="authError"></div>
  </div>

  <!-- messenger -->
  <div id="app">
    <div id="side">
      <div id="sideHead">
        <div>
          <div id="meName"></div>
          <div id="status" class="off">Offline</div>
        </div>
        <button id="logoutBtn">ออกจากระบบ</button>
      </div>
      <div id="searchBox">
        <input id="searchInput" placeholder="ค้นหาผู้คน...">
      </div>
      <div id="lists">
        <div id="searchSection" style="display:none">
          <div class="listTitle">ผลการค้นหา</div>
          <div id="searchResults"></div>
        </div>
        <div class="listTitle">แชทของฉัน</div>
        <div id="convList">
          <div class="empty">ยังไม่มีบทสนทนา</div>
        </div>
      </div>
    </div>

    <div id="main">
      <div id="threadHead">เลือกแชทเพื่อเริ่มต้นสนทนา</div>
      <div id="log">
        <div style="margin: auto; color: var(--text-muted); font-size: 15px;">ยังไม่ได้เลือกแชท</div>
      </div>
      <div id="composer">
        <input id="msgInput" placeholder="พิมพ์ข้อความ..." disabled>
        <button id="sendBtn" class="primary" disabled>ส่ง</button>
      </div>
    </div>
  </div>

  <script>
    let ws = null;
    let token = null;
    let me = null;
    let currentPeer = null;
    let lastMsgTime = null;

    const SERVER = "http://localhost:3223";
    const $ = (id) => document.getElementById(id);
    const log = $("log");
    const apiBase = () => SERVER;
    const wsBase = () => SERVER.replace(/^http/, "ws");

    async function api(path, opts = {}) {
      opts.headers = Object.assign({ "Authorization": "Bearer " + token }, opts.headers);
      const res = await fetch(apiBase() + path, opts);
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || res.status);
      return data;
    }

    function addMsg(cls, dateObj, text) {
      if (cls === "sys") {
        const div = document.createElement("div");
        div.className = "msg sys";
        div.textContent = text;
        log.appendChild(div);
        return;
      }

      const TEN_MINUTE_LIMIT = 10 * 60 * 1000;
      if (!lastMsgTime || (dateObj.getTime() - lastMsgTime.getTime() > TEN_MINUTE_LIMIT)) {
        const divider = document.createElement("div");
        divider.className = "time-divider";

        const options = { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' };
        divider.textContent = dateObj.toLocaleString('th-TH', options);
        log.appendChild(divider);
      }

      lastMsgTime = dateObj;

      const div = document.createElement("div");
      div.className = "msg " + cls;

      div.title = dateObj.toLocaleString('th-TH', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' });

      const body = document.createElement("div");
      body.textContent = text;
      div.appendChild(body);

      log.appendChild(div);

      setTimeout(() => {
        log.scrollTop = log.scrollHeight;
      }, 10);
    }

    // ---------- auth ----------
    async function authRequest(path) {
      $("authError").textContent = "";
      const username = $("userInput").value.trim();
      const password = $("passInput").value;
      if (!username || !password) {
        $("authError").textContent = "กรอก username และ password ก่อน";
        return null;
      }
      try {
        const res = await fetch(apiBase() + path, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (!res.ok) {
          $("authError").textContent = data.error || "เกิดข้อผิดพลาด";
          return null;
        }
        return data;
      } catch {
        $("authError").textContent = "ต่อ server ไม่ได้ — รัน go run . อยู่หรือเปล่า?";
        return null;
      }
    }

    $("registerBtn").onclick = async () => {
      const data = await authRequest("/register");
      if (data) {
        $("authError").style.color = "var(--success)";
        $("authError").textContent = "สมัครสำเร็จ! กดเข้าสู่ระบบได้เลย";
      }
    };

    $("loginBtn").onclick = async () => {
      $("authError").style.color = "var(--danger)";
      const data = await authRequest("/login");
      if (!data) return;
      token = data.token;
      me = data.user;
      $("authPanel").style.display = "none";
      $("app").classList.add("on");
      $("meName").textContent = me.username;
      connect();
      loadConversations();
    };

    $("logoutBtn").onclick = () => location.reload();

    // ---------- websocket ----------
    function connect() {
      ws = new WebSocket(wsBase() + "/ws?token=" + encodeURIComponent(token));

      ws.onopen = () => { $("status").textContent = "ออนไลน์"; $("status").className = "on"; };
      ws.onclose = () => { $("status").textContent = "ออฟไลน์"; $("status").className = "off"; ws = null; };

      ws.onmessage = (ev) => {
        let msg;
        try { msg = JSON.parse(ev.data); } catch { return; }
        if (msg.type !== "direct-message") return;

        const mine = msg.senderName === me.username;
        const thread = mine ? msg.to : msg.senderName;

        if (thread === currentPeer) {
          const dateObj = new Date();
          addMsg(mine ? "out" : "in", dateObj, String(msg.data));
        }
        setTimeout(loadConversations, 300);
      };
    }

    // ---------- conversations ----------
    async function loadConversations() {
      let convs;
      try { convs = (await api("/dm/conversations")).conversations || []; }
      catch { return; }

      const list = $("convList");
      list.innerHTML = "";
      if (convs.length === 0) {
        list.innerHTML = '<div class="empty">ยังไม่มีบทสนทนา</div>';
        return;
      }
      for (const c of convs) {
        const div = document.createElement("div");
        div.className = "person" + (c.peerName === currentPeer ? " active" : "");
        const prefix = c.lastSender === me.username ? "คุณ: " : "";
        div.innerHTML = '<div class="name"></div><div class="preview"></div>';
        div.querySelector(".name").textContent = c.peerName;
        div.querySelector(".preview").textContent = prefix + c.lastMessage;
        div.onclick = () => openThread(c.peerName);
        list.appendChild(div);
      }
    }

    // ---------- search ----------
    let searchTimer = null;
    $("searchInput").addEventListener("input", () => {
      clearTimeout(searchTimer);
      const q = $("searchInput").value.trim();
      if (!q) { $("searchSection").style.display = "none"; return; }
      searchTimer = setTimeout(async () => {
        try {
          const users = (await api("/users?q=" + encodeURIComponent(q))).users || [];
          const box = $("searchResults");
          box.innerHTML = "";
          $("searchSection").style.display = "block";
          if (users.length === 0) {
            box.innerHTML = '<div class="empty">ไม่พบผู้ใช้</div>';
            return;
          }
          for (const u of users) {
            const div = document.createElement("div");
            div.className = "person";
            div.innerHTML = '<div class="name"></div>';
            div.querySelector(".name").textContent = u.username;
            div.onclick = () => {
              $("searchInput").value = "";
              $("searchSection").style.display = "none";
              openThread(u.username);
            };
            box.appendChild(div);
          }
        } catch { }
      }, 300);
    });

    // ---------- thread ----------
    async function openThread(peer) {
      currentPeer = peer;
      $("threadHead").textContent = peer;
      $("msgInput").disabled = false;
      $("sendBtn").disabled = false;
      log.innerHTML = "";
      lastMsgTime = null;
      loadConversations();

      try {
        const msgs = (await api("/dm/history?peer=" + encodeURIComponent(peer))).messages || [];
        for (const m of msgs) {
          const mine = m.senderName === me.username;
          const dateObj = new Date(m.createdAt);
          addMsg(mine ? "out" : "in", dateObj, m.data);
        }
      } catch (e) {
        addMsg("sys", null, "โหลดประวัติไม่ได้: " + e.message);
      }
      $("msgInput").focus();
    }

    // ---------- send ----------
    function sendChat() {
      const text = $("msgInput").value.trim();
      if (!text || !currentPeer) return;
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        addMsg("sys", null, "ยังไม่ได้เชื่อมต่อ server");
        return;
      }
      ws.send(JSON.stringify({ type: "direct-message", to: currentPeer, data: text }));
      const dateObj = new Date();
      addMsg("out", dateObj, text);
      $("msgInput").value = "";
      setTimeout(loadConversations, 300);
    }

    $("sendBtn").onclick = sendChat;
    $("msgInput").addEventListener("keydown", (e) => { if (e.key === "Enter") sendChat(); });
    $("passInput").addEventListener("keydown", (e) => { if (e.key === "Enter") $("loginBtn").click(); });
  </script>
</body>

</html>
